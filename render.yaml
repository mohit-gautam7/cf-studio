services:
  - type: web
    name: cf-studio
    runtime: python
    plan: free
    buildCommand: "echo no build needed"
    startCommand: "python main.py --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: CFSTUDIO_SECRET
        generateValue: true
